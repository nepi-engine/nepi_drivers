driver:
  pkg_name: NPX_HNAV
  display_name: HNav TCP
  description: HNav binary protocol NavPose sensor over TCP
  type: NPX
  group_id: None
  NODE_DICT:
    file_name: npx_hnav_tcu_node.py
    class_name: HNavNode
  DRIVER_DICT:
    file_name: None
    class_name: None
  DISCOVERY_DICT:
    file_name: npx_hnav_tcu_discovery.py
    class_name: HNavDiscovery
    process: CALL
    OPTIONS:
      tcp_host:
        type: String
        default: '127.0.0.1'
        value: 'NEPI_NAV_IP_HNAV'
      tcp_port:
        type: Int
        default: '16718'
        value: 'NEPI_NAV_PORT_HNAV'
